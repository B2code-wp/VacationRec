<ion-header>
  <mat-toolbar color="primary" class="app-toolbar mat-elevation-z4">
    <div class="toolbar-container">

      <!-- LOGO -->
      <div class="header-left">
        <a class="logo" routerLink="/">
          <div class="logo-icon-wrapper">
            <mat-icon>search</mat-icon>
          </div>
          <span class="logo-text">Go<span>To</span></span>
        </a>
      </div>

      <span class="spacer"></span>

      <!-- ACTION BUTTONS -->
      <div class="header-actions">
        <button mat-button routerLink="/registration-form">
          <mat-icon>person_add</mat-icon>
          Register
        </button>

        <button mat-button routerLink="/home">
          <mat-icon>arrow_back</mat-icon>
          Back
        </button>
      </div>
    </div>
  </mat-toolbar>

<div class="destination-card">
  <img [src]="imageUrl" alt="{{ title }}" class="card-image" />
  <div class="card-content">
    <h2 class="card-title">{{ title }}</h2>
    <p class="card-description">{{ description }}</p>
    <button mat-raised-button color="primary" (click)="onSelect()">
      Explore
    </button>
  </div>
</div>
