<ion-content class="reviews-content">

  <!-- HEADER -->
<ion-header>
  <mat-toolbar color="primary" class="app-toolbar mat-elevation-z4">

    <div class="toolbar-container">

      <!-- LOGO -->
      <div class="header-left">
        <a class="logo" routerLink="/">
          <div class="logo-icon-wrapper">
            <mat-icon>search</mat-icon>
          </div>
          <span class="logo-text">Go<span>To</span></span>
        </a>
      </div>

      <span class="spacer"></span>
    </div>

    <button mat-button routerLink="/login" (click)="closeMenu()" class="action-btn">
      <mat-icon>login</mat-icon>
      <span class="button-text">Sign In</span>
    </button>


    <button mat-button routerLink="/home" (click)="closeMenu()">
      <mat-icon>arrow_back</mat-icon>
      Back
    </button>


  </mat-toolbar>
</ion-header>


  <!-- REVIEWS -->

  <div class="reviews-container">

    @for (review of reviews; track review; let index = $index) {

      <ion-card class="review-card">

        <!-- USER -->
        <ion-item lines="none" class="review-header">
          <ion-avatar slot="start">
            <img
              [src]="'https://picsum.photos/80/80?random=' + index"
              alt="User avatar" />
          </ion-avatar>

          <ion-label>
            <h2 class="user-name">{{ review.userName }}</h2>
            <small class="review-date">
              {{ review.date }}
            </small>
          </ion-label>
        </ion-item>

        <!-- CONTENT -->
        <ion-card-content>

          <!-- RATING -->
          <div class="review-rating">
            @for (star of [1,2,3,4,5]; track star) {
              <ion-icon
                [name]="star <= review.rating ? 'star' : 'star-outline'">
              </ion-icon>
            }
          </div>

          <!-- COMMENT -->
          <p class="review-comment">
            {{ review.comment }}
          </p>

        </ion-card-content>

      </ion-card>

    }

  </div>

  <!-- INFINITE SCROLL -->
  <ion-infinite-scroll (ionInfinite)="onIonInfinite($event)">
    <ion-infinite-scroll-content
      loadingSpinner="bubbles"
      loadingText="Loading more reviews...">
    </ion-infinite-scroll-content>
  </ion-infinite-scroll>

</ion-content>
