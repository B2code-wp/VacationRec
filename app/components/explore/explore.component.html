<ion-header>
  <mat-toolbar color="primary" class="app-toolbar mat-elevation-z4">

    <div class="toolbar-container">

      <!-- LOGO -->
      <a class="logo" routerLink="/">
        <div class="logo-icon-wrapper">
          <mat-icon>travel_explore</mat-icon>
        </div>
        <span class="logo-text">Go<span>To</span></span>
      </a>

      <span class="spacer"></span>

      <!-- ACTIONS -->
      <div class="actions">
        <button mat-button routerLink="/home" class="action-btn">
          <mat-icon>explore</mat-icon>
          <span>Explore</span>
        </button>

        <button mat-button routerLink="/login" class="action-btn">
          <mat-icon>login</mat-icon>
          <span>Sign In</span>
        </button>
      </div>

      <!-- MOBILE MENU BUTTON -->
      <button mat-icon-button class="menu-toggle" (click)="menuOpen = !menuOpen">
        <mat-icon>menu</mat-icon>
      </button>
    </div>

    <!-- MOBILE MENU -->
    <div class="mobile-menu" [class.open]="menuOpen">
      <button mat-button routerLink="/registration-form">
        <mat-icon>person_add</mat-icon> Register

      </button>
      <button mat-button routerLink="/login">
        <mat-icon>login</mat-icon> Sign In
      </button>
    </div>

  </mat-toolbar>
</ion-header>

<!-- HERO / EXPLORE -->
<section class="explore-section">
  <header class="explore-header">
    <h2 class="section-title">Explore the World</h2>
    <p class="section-subtitle">Relive experiences, embrace cultures, and discover new horizons.</p>
  </header>

  <div class="destination-grid">
    <mat-card class="destination-card" appearance="outlined">
      <img mat-card-image src="https://plus.unsplash.com/premium_photo-1748428551206-bebd33f803e3?w=800" alt="Serene tropical beach">
      <div class="overlay">
        <mat-icon>beach_access</mat-icon>
        <span class="label">Beach Escapes</span>
      </div>
    </mat-card>

    <mat-card class="destination-card" appearance="outlined">
      <img mat-card-image src="https://images.unsplash.com/photo-1600103560746-50066b853d03?w=800" alt="Traditional local market">
      <div class="overlay">
        <mat-icon>festival</mat-icon> <span class="label">Local Culture</span>
      </div>
    </mat-card>

    <mat-card class="destination-card" appearance="outlined">
      <img mat-card-image src="https://images.unsplash.com/photo-1497005367839-6e852de72767?w=800" alt="Mountain hiker at sunset">
      <div class="overlay">
        <mat-icon>landscape</mat-icon>
        <span class="label">Adventure</span>
      </div>
    </mat-card>

    <mat-card class="destination-card" appearance="outlined">
      <img mat-card-image src="https://images.unsplash.com/photo-1526778548025-fa2f459cd5c1?w=800" alt="Neon city lights">
      <div class="overlay">
        <mat-icon>celebration</mat-icon>
        <span class="label">Nightlife</span>
      </div>
    </mat-card>

    <mat-card class="destination-card" appearance="outlined">
      <img mat-card-image src="https://images.unsplash.com/photo-1500530855697-b586d89ba3ee?w=800" alt="Ancient architectural ruins">
      <div class="overlay">
        <mat-icon>museum</mat-icon>
        <span class="label">History</span>
      </div>
    </mat-card>
  </div>
</section>
<footer class="footer">
  <p>© 2026 ToGo Travel</p>
  <small>Explore the world with confidence</small>
</footer>
